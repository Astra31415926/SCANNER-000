<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB-11: SCI Multi-Layer QR Encoder</title>
    <meta name="description" content="Encode 3 QR codes in 1 image. Spectral separation via SCI Model.">
    
    <!-- PWA & Styling -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- QR Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root {
            --r-color: #FF004D;
            --g-color: #00FF41;
            --b-color: #0088FF;
            --bg-color: #050505;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden;
            transition: background 0.5s;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        textarea {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.4);
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .logo-q { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .logo-r { color: var(--r-color); text-shadow: 0 0 15px var(--r-color); }
        .logo-g { color: var(--g-color); text-shadow: 0 0 15px var(--g-color); }
        .logo-b { color: var(--b-color); text-shadow: 0 0 15px var(--b-color); }

        /* Scan Animation */
        .scan-line { 
            position: absolute; left: 0; right: 0; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--g-color), transparent); 
            box-shadow: 0 0 15px var(--g-color); 
            top: 0; z-index: 20;
            opacity: 0;
            display: none;
        }
        
        .scan-active .scan-line {
            display: block;
            opacity: 1;
            animation: scanMove 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes scanMove { 
            0% { top: 0%; opacity: 1; } 
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
        
        @keyframes flash { 
            0% { opacity: 0; } 
            20% { opacity: 0.9; } 
            100% { opacity: 0; } 
        }
        .flash-anim { animation: flash 0.4s ease-out; }

        /* Indicators */
        .indicator { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: #222; 
            transition: all 0.3s; 
        }
        .active-r { background: var(--r-color); box-shadow: 0 0 12px var(--r-color); }
        .active-g { background: var(--g-color); box-shadow: 0 0 12px var(--g-color); }
        .active-b { background: var(--b-color); box-shadow: 0 0 12px var(--b-color); }
        
        /* UI Elements */
        .dropdown-menu { 
            transform: translateY(-10px); opacity: 0; visibility: hidden; 
            transition: all 0.2s ease; 
        }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        
        .modal-overlay { 
            opacity: 0; visibility: hidden; transition: all 0.3s ease; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }

        /* Viewfinder */
        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; border-radius: 0 0 8px 0; }
        
        .targeting .corner { border-color: var(--g-color); box-shadow: 0 0 10px var(--g-color); }
        
        .mode-camera .input-section { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .mode-camera .central-block { height: 70vh; }
        
        .input-section { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .central-block { transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-action {
            background: linear-gradient(145deg, #222, #1a1a1a);
            box-shadow: 5px 5px 15px #0a0a0a, -5px -5px 15px #1f1f1f;
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.96); box-shadow: inset 2px 2px 5px #000; }

        .social-link { opacity: 0.5; transition: opacity 0.3s; }
        .social-link:hover { opacity: 1; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 pb-6">
    <!-- Inputs -->
    <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display: none;">
    <input type="file" id="galleryInput" accept="image/*" style="display: none;">

    <!-- Header -->
    <header class="flex items-center justify-between mb-4 relative z-50">
        <div class="flex items-center gap-3">
            <canvas id="mini-qr" width="32" height="32" class="rounded-lg bg-zinc-900/50 border border-white/10"></canvas>
            <div class="flex flex-col">
                <h1 class="text-2xl font-black tracking-tighter flex gap-0.5">
                    <span class="logo-q">Q</span><span class="logo-r">R</span><span class="logo-g">G</span><span class="logo-b">B</span>
                </h1>
                <span class="text-[8px] text-zinc-500 font-mono tracking-widest uppercase">SCI Engine v1.1</span>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="menu-btn" class="w-10 h-10 flex items-center justify-center text-white text-xl active:scale-90 transition-transform">☰</button>
        </div>
        
        <!-- Menu Dropdown -->
        <div id="dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-56 bg-zinc-900/95 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl z-50 overflow-hidden">
            <div class="flex border-b border-white/10 p-1 bg-zinc-800/50">
                <button onclick="setLanguage('uk')" class="flex-1 py-2 text-[10px] font-bold text-zinc-400 hover:text-white transition-colors border-r border-white/5">🇺🇦 UK</button>
                <button onclick="setLanguage('en')" class="flex-1 py-2 text-[10px] font-bold text-zinc-400 hover:text-white transition-colors">🇬🇧 EN</button>
            </div>
            <div class="py-0">
                <a href="#" onclick="openModal('usage')" class="block px-4 py-3.5 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5" data-i18n="menu_usage">Як користуватися</a>
                <a href="#" onclick="openModal('tech')" class="block px-4 py-3.5 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5" data-i18n="menu_tech">Технологія SCI</a>
                <button onclick="globalReset()" class="w-full text-left px-4 py-3.5 text-xs text-red-400 hover:bg-zinc-800 font-bold uppercase tracking-wide" data-i18n="menu_reset">Reset</button>
            </div>
        </div>
    </header>

    <!-- Input Section -->
    <div class="input-section space-y-2 mb-4 px-1">
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-red-600 rounded-full"></div>
            <textarea id="r-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="RED CHANNEL"></textarea>
        </div>
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-green-600 rounded-full"></div>
            <textarea id="g-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="GREEN CHANNEL"></textarea>
        </div>
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-full"></div>
            <textarea id="b-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="BLUE (PRIORITY)"></textarea>
        </div>
    </div>

    <!-- Central Block -->
    <div class="central-block flex-1 flex flex-col items-center justify-center relative">
        <div id="central-container" class="relative w-full max-w-xs aspect-square bg-zinc-950 rounded-3xl p-4 border border-white/5 shadow-2xl overflow-hidden">
            <div class="absolute inset-0 opacity-20 pointer-events-none" style="background: radial-gradient(circle at 20% 20%, #FF004D 0%, transparent 40%), radial-gradient(circle at 80% 80%, #0088FF 0%, transparent 40%);"></div>
            
            <canvas id="qr-main" width="512" height="512" class="w-full h-full transition-all duration-500 relative z-10"></canvas>
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden z-10" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden z-12"></canvas>
            
            <div class="viewfinder-corners hidden" id="viewfinder-ui">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
            </div>
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <!-- Results -->
        <div id="result-indicators" class="w-full max-w-xs mt-4 space-y-1.5 opacity-0 transition-opacity duration-500">
            <div id="res-r" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter font-mono flex-1 truncate">R: —</span>
            </div>
            <div id="res-g" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter font-mono flex-1 truncate">G: —</span>
            </div>
            <div id="res-b" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-blue-500/20 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-tighter font-mono flex-1 truncate">B: —</span>
            </div>
        </div>
    </div>

    <!-- Buttons -->
    <div class="mt-6 space-y-4">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-bold rounded-2xl hidden active:scale-95 text-sm tracking-widest uppercase shadow-lg shadow-white/20" data-i18n="btn_save">Save Result</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startCamera()" class="py-3.5 bg-zinc-900 text-white font-semibold rounded-2xl border border-white/10 active:scale-95 text-xs uppercase tracking-wider" data-i18n="btn_camera">Камера</button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="py-3.5 bg-zinc-900 text-white font-semibold rounded-2xl border border-white/10 active:scale-95 text-xs uppercase tracking-wider" data-i18n="btn_gallery">Галерея</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 border-t border-white/5 pt-6 pb-4 text-center">
        <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-4">SCI Universal Model</p>
        <p class="text-[8px] text-zinc-600">© 2026 Mykhailo Kashkarov</p>
    </footer>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="modal-content w-full max-w-md bg-zinc-900/95 border border-white/10 rounded-3xl p-6 shadow-2xl relative max-h-[80vh] overflow-y-auto backdrop-blur-xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white text-xs font-bold border border-white/10 px-3 py-1 rounded-lg hover:bg-zinc-800 transition-colors" data-i18n="btn_close">CLOSE</button>
            <h2 id="modal-title" class="text-lg font-bold mb-4"></h2>
            <div id="modal-body" class="text-sm text-zinc-300 space-y-4 leading-relaxed"></div>
        </div>
    </div>

<script>
        // === 1. CONFIGURATION & TRANSLATIONS ===
        const translations = {
            uk: {
                menu_usage: "Як користуватися", menu_tech: "Технологія", menu_reset: "Скинути все",
                btn_save: "Зберегти PNG", btn_camera: "Камера", btn_gallery: "Галерея", btn_close: "ЗАКРИТИ",
                ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL",
                res_fail: "[!] Помилка",
                m_usage_title: "📝 Інструкція", 
                m_usage_body: "<p><b>1. Створення:</b> Введіть текст у поля R, G, B. Код сформується автоматично.</p><p><b>2. Сканування:</b> Натисніть 'Камера' та наведіть на кольоровий QR-код.</p>",
                m_tech_title: "⚙️ Технологія SCI", 
                m_tech_body: `<p><b>SCI (Spectral Channel Integrity)</b> — модель для розділення спектральних каналів.</p><p>Використовується формула декуплізації для очищення каналів від перехресних завад:</p><code>V_out = (V_in - (N*k)) * Gain + Offset</code>`
            },
            en: {
                menu_usage: "How to use", menu_tech: "SCI Technology", menu_reset: "Reset All",
                btn_save: "Save PNG", btn_camera: "Camera", btn_gallery: "Gallery", btn_close: "CLOSE",
                ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL",
                res_fail: "[!] Failed",
                m_usage_title: "📝 Usage", 
                m_usage_body: "<p><b>1. Create:</b> Enter text into R, G, B fields.</p><p><b>2. Scan:</b> Tap 'Camera' and point at a color QR code.</p>",
                m_tech_title: "⚙️ SCI Technology", 
                m_tech_body: "<p><b>SCI</b> model cleans spectral channels using cross-talk cancellation.</p>"
            }
        };

        // === 2. DOM ELEMENTS ===
        const els = {
            r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'), mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'), freeze: document.getElementById('freeze-frame'),
            centralContainer: document.getElementById('central-container'), flash: document.getElementById('flash-layer'),
            resultIndicators: document.getElementById('result-indicators'),
            resR: document.getElementById('res-r'), resG: document.getElementById('res-g'), resB: document.getElementById('res-b'),
            viewfinder: document.getElementById('viewfinder-ui'),
            dropdown: document.getElementById('dropdown')
        };

        let currentLang = 'uk';
        let scanning = false;
        let results = {r:null, g:null, b:null};
        let analysisReady = false;

        // === 3. CORE ALGORITHMS ===

        // Bradley Adaptive Thresholding
        function applyBradley(imgData, chIdx) {
            const w = imgData.width, h = imgData.height;
            const input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            const s = Math.floor(w / 8), t = 15; // Window size, threshold %

            // Compute integral image
            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    sum += input[(y * w + x) * 4 + chIdx];
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }

            // Apply threshold
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                    const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1);
                    const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const val = input[(y * w + x) * 4 + chIdx];
                    const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                    const idx = (y * w + x) * 4;
                    output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
                }
            }
            return output;
        }

        // === 4. QR GENERATION ===
        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                els.main.style.opacity = 0.1;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            els.main.style.opacity = 1;
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            document.body.classList.remove('mode-camera');
            els.viewfinder.classList.add('hidden');
            
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); 
                tmp.addData(unescape(encodeURIComponent(t))); tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); 
                qr.addData(unescape(encodeURIComponent(text))); qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            ctx.globalCompositeOperation = "source-over";
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 32, 32);
        }

        // === 5. SCI PROCESSING & SCANNING ===
        function processImageData(img, w, h, isFileScan) {
            // --- START SCI MODEL INTEGRATION ---
            const d = img.data;
            // Create a copy of source data to prevent "dirty reads" when modifying in-place
            const src = new Uint8ClampedArray(d);

            // SCI Coefficients from successful tests
            const sciConfig = {
                R: { gain: 0.5, offset: 56, gamma: 0.1, kG: 0.10, kB: 0.20 },
                G: { gain: 1.1, offset: 28, gamma: 0.2, kR: 0.18, kB: 0.33 },
                B: { gain: 1.7, offset: 14, gamma: 1.7, kR: 0.05, kG: 0.13 }
            };

            for (let i = 0; i < d.length; i += 4) {
                let r_in = src[i], g_in = src[i+1], b_in = src[i+2];

                // Process RED Channel
                // R_out = (R_in - (G_in*kG + B_in*kB)) * Gain + Offset
                let valR = (r_in - (g_in * sciConfig.R.kG + b_in * sciConfig.R.kB)) * sciConfig.R.gain + sciConfig.R.offset;
                valR = Math.max(0, Math.min(255, valR));
                // Gamma: 255 * (val/255)^(1/gamma)
                valR = 255 * Math.pow(valR / 255, 1 / sciConfig.R.gamma);
                d[i] = Math.max(0, Math.min(255, valR));

                // Process GREEN Channel
                let valG = (g_in - (r_in * sciConfig.G.kR + b_in * sciConfig.G.kB)) * sciConfig.G.gain + sciConfig.G.offset;
                valG = Math.max(0, Math.min(255, valG));
                valG = 255 * Math.pow(valG / 255, 1 / sciConfig.G.gamma);
                d[i+1] = Math.max(0, Math.min(255, valG));

                // Process BLUE Channel
                let valB = (b_in - (r_in * sciConfig.B.kR + g_in * sciConfig.B.kG)) * sciConfig.B.gain + sciConfig.B.offset;
                valB = Math.max(0, Math.min(255, valB));
                valB = 255 * Math.pow(valB / 255, 1 / sciConfig.B.gamma);
                d[i+2] = Math.max(0, Math.min(255, valB));
            }
            // --- END SCI MODEL INTEGRATION ---

            // Now scan the corrected channels
            let foundAny = false;
            [0, 1, 2].forEach(idx => {
                const ch = ['r', 'g', 'b'][idx];
                if (results[ch]) return; // Skip if already found
                
                // Apply Bradley to the SCI-cleaned channel data
                const mono = applyBradley(img, idx);
                const code = jsQR(mono, w, h, { inversionAttempts: "attemptBoth" });
                if (code) { results[ch] = code.data; foundAny = true; }
            });
            
            if(foundAny) {
                els.viewfinder.classList.add('targeting'); 
                // Logic: If Blue found (priority) OR all found -> finish
                if(results.b || (results.r && results.g && results.b)) {
                    analysisReady = true;
                    if(!isFileScan) triggerCaptureSequence();
                }
            }
            return foundAny;
        }

        // === 6. CAMERA & UI FLOW ===
        function triggerCaptureSequence() {
            stopCamera();
            els.freeze.width = 480; els.freeze.height = 480;
            const fctx = els.freeze.getContext('2d');
            const vw = els.video.videoWidth, vh = els.video.videoHeight;
            const s = Math.min(vw, vh);
            fctx.drawImage(els.video, (vw-s)/2, (vh-s)/2, s, s, 0, 0, 480, 480);
            els.video.classList.add('hidden'); 
            els.freeze.classList.remove('hidden');
            startVisualizationSequence();
        }

        function startVisualizationSequence() {
            els.centralContainer.classList.add('scan-active');
            playSuccessSound();
            setTimeout(() => {
                els.flash.classList.add('flash-anim');
                setTimeout(() => {
                    els.flash.classList.remove('flash-anim');
                    els.centralContainer.classList.remove('scan-active');
                    els.viewfinder.classList.remove('targeting');
                    updateResultUI();
                }, 400);
            }, 2600);
        }

        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 2.5);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.5);
                gain.gain.setValueAtTime(0.05, now + 2.0);
                gain.gain.linearRampToValueAtTime(0, now + 2.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 2.6);
            } catch(e) {}
        }

        function updateResultUI() {
            els.resultIndicators.style.opacity = 1;
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                const indicator = el.querySelector('.indicator');
                const text = el.querySelector('span');
                if(results[ch]) {
                    text.textContent = results[ch];
                    indicator.className = 'indicator active-'+ch;
                    el.style.opacity = 1;
                    els[ch].value = results[ch];
                } else {
                    el.style.opacity = 0.4;
                    text.textContent = translations[currentLang].res_fail;
                }
            });
            generateQR(); // Regenerate merged QR from results
            document.body.classList.remove('mode-camera');
        }

        async function startCamera() {
            globalReset();
            document.body.classList.add('mode-camera');
            els.viewfinder.classList.remove('hidden');
            els.resultIndicators.style.opacity = 0.7;
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
                els.video.srcObject = s; 
                els.video.play();
                els.video.classList.remove('hidden');
                els.main.style.opacity = 0;
                els.freeze.classList.add('hidden');
                scanning = true; 
                requestAnimationFrame(scanFrame);
            } catch(e) { alert("Camera Error: " + e); }
        }

        function stopCamera() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        }

        function scanFrame() {
            if (!scanning) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const cv = document.createElement('canvas');
                cv.width = 480; cv.height = 480;
                const s = Math.min(els.video.videoWidth, els.video.videoHeight);
                cv.getContext('2d').drawImage(els.video, (els.video.videoWidth-s)/2, (els.video.videoHeight-s)/2, s, s, 0, 0, 480, 480);
                
                if(!analysisReady) {
                   const found = processImageData(cv.getContext('2d').getImageData(0,0,480,480), 480, 480, false);
                   if(found) els.viewfinder.classList.add('targeting');
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    prepareScannerUI();
                    const s = 1024, cv = document.createElement('canvas');
                    cv.width = s; cv.height = s;
                    const ctx = cv.getContext('2d');
                    const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, s, s);
                    els.freeze.width = 480; els.freeze.height = 480;
                    els.freeze.getContext('2d').drawImage(cv, 0, 0, 480, 480);
                    els.freeze.classList.remove('hidden'); 
                    els.video.classList.add('hidden');
                    els.main.style.opacity = 0;
                    
                    processImageData(ctx.getImageData(0,0,s,s), s, s, true);
                    startVisualizationSequence();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // === 7. HELPERS ===
        function setLanguage(l) {
            currentLang = l;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[l][key]) el.textContent = translations[l][key];
            });
            els.r.placeholder = translations[l].ph_r;
            els.g.placeholder = translations[l].ph_g;
            els.b.placeholder = translations[l].ph_b;
        }

        function prepareScannerUI() {
            results = {r:null, g:null, b:null}; analysisReady = false;
            els.main.style.opacity = 0;
            els.resultIndicators.style.opacity = 0;
            els.centralContainer.classList.remove('scan-active');
        }

        function globalReset() {
            stopCamera(); 
            els.r.value = ""; els.g.value = ""; els.b.value = "";
            results = {r:null, g:null, b:null}; analysisReady = false;
            generateQR(); 
            els.resultIndicators.style.opacity = 0;
            els.centralContainer.classList.remove('scan-active');
            els.main.classList.remove('hidden'); 
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            els.viewfinder.classList.add('hidden');
            document.body.classList.remove('mode-camera');
        }

        function openModal(t) {
            document.getElementById('modal-title').textContent = translations[currentLang]['m_'+t+'_title'];
            document.getElementById('modal-body').innerHTML = translations[currentLang]['m_'+t+'_body'];
            document.getElementById('modal-overlay').classList.add('show');
            els.dropdown.classList.remove('show');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
        function saveQR() { const a = document.createElement('a'); a.download = 'SCI_QR_Result.png'; a.href = els.main.toDataURL(); a.click(); }

        // Init
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
        document.getElementById('menu-btn').onclick = (e) => { e.stopPropagation(); els.dropdown.classList.toggle('show'); };
        document.onclick = () => els.dropdown.classList.remove('show');
        setLanguage('uk');
        generateQR();
    </script>
</body>
</html>
